<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>

    <script>
      // 👇 THIS IS THE FIX
      const path = window.location.pathname;
      const repo = "/Expense-App";

      // Redirect to index.html with route preserved
      window.location.replace(
        repo + "/index.html#" + path.replace(repo, "")
      );
    </script>
  </head>
  <body></body>
</html>
